# Kickoff Pulse — local infrastructure.
#
# Brings up the stateful services the app talks to over the network. The
# interactive, hardware-bound pieces (Streamlit, mic-driven Whisper, MPS vision)
# stay native — see LIBRARY_SETUP.md.
#
#   docker compose up -d                       # postgres + analytics + backups
#   docker compose --profile tools up -d       # + pgAdmin   (localhost:5050)
#   docker compose --profile llm   up -d       # + Ollama    (localhost:11434)
#
# macOS note: native Ollama uses the Metal GPU and is faster than this CPU-only
# container. Skip the `llm` profile if you already run Ollama natively.

services:
  postgres:
    # pgvector image = stock Postgres 16 + the `vector` extension, used for
    # semantic search over matches/notes. Drop-in compatible with the existing
    # pgdata volume.
    image: pgvector/pgvector:pg16
    container_name: kickoff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kickoff
      POSTGRES_PASSWORD: kickoff
      POSTGRES_DB: kickoff
    ports:
      - "5432:5432"
    volumes:
      - kickoff_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kickoff -d kickoff"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Analytics / BI dashboards over the match + event data. Keeps its OWN metadata
  # in a dedicated volume (so it never pollutes the kickoff schema); connect it
  # to the kickoff DB as a data source on first run — see LIBRARY_SETUP.md.
  metabase:
    image: metabase/metabase:latest
    container_name: kickoff-metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - kickoff_metabase:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

  # Scheduled pg_dump backups with retention, written to a named volume.
  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: kickoff-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: kickoff
      POSTGRES_USER: kickoff
      POSTGRES_PASSWORD: kickoff
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "14"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
    volumes:
      - kickoff_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # Optional browser DB inspector — `--profile tools`.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kickoff-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      # NB: pgAdmin rejects reserved domains like .local, so use a normal one.
      PGADMIN_DEFAULT_EMAIL: admin@kickoff.example.com
      PGADMIN_DEFAULT_PASSWORD: kickoff
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - kickoff_pgadmin:/var/lib/pgadmin

  # Optional local LLM — `--profile llm`. On Apple Silicon prefer native Ollama.
  ollama:
    image: ollama/ollama:latest
    container_name: kickoff-ollama
    restart: unless-stopped
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - kickoff_ollama:/root/.ollama

volumes:
  kickoff_pgdata:
  kickoff_pgadmin:
  kickoff_ollama:
  kickoff_backups:
  kickoff_metabase:

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kickoff Pulse — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Sora:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&family=Architects+Daughter&display=swap" rel="stylesheet" />
<style>
:root{
  --c-bg1:#080b16; --c-bg2:#0b1126;
  --c-home:#1E7BFF; --c-home2:#4DA3FF; --c-signal:#4DA3FF;
  --c-away:#DC2626; --c-live:#FF3D6E; --c-cyan:#2BE7FF;
  --c-text:#EAF1FF; --c-muted:#9FB6DD; --c-subtle:#7E95BF;
  --panel:rgba(255,255,255,0.055); --panel-2:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08); --border-2:rgba(255,255,255,0.12);
  --radius:12px; --blur:12px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --font-disp:'Chakra Petch',sans-serif;
  --font-body:'Sora',sans-serif;
  --font-mono:'Spline Sans Mono',monospace;
  /* density */
  --gap:16px; --pad:20px; --rowgap:10px; --fs:15px;
}
[data-density="compact"]{ --gap:10px; --pad:14px; --rowgap:6px; --fs:14px; }
[data-density="regular"]{ --gap:16px; --pad:20px; --rowgap:10px; --fs:15px; }
[data-density="breathable"]{ --gap:26px; --pad:30px; --rowgap:16px; --fs:16px; }

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1200px 700px at 80% -10%, rgba(30,123,255,.10), transparent 60%),
    linear-gradient(160deg,var(--c-bg1),var(--c-bg2));
  background-attachment:fixed;
  color:var(--c-text); font-family:var(--font-body); font-size:var(--fs);
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:var(--font-mono); font-variant-numeric:tabular-nums;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

/* ---------- App shell ---------- */
.app{min-height:100vh;}
.app.has-side{display:grid; grid-template-columns:248px 1fr;}
.content{min-width:0;}
.content-inner{max-width:1240px; margin:0 auto; padding:24px;}

/* ---------- Top nav ---------- */
.topnav{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; gap:24px;
  padding:0 24px; height:64px;
  background:rgba(8,11,22,.72); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.topnav-tabs{display:flex; gap:6px; margin-left:8px;}
.tab{
  font-family:var(--font-disp); font-weight:600; font-size:14px; letter-spacing:.02em;
  color:var(--c-muted); background:none; border:none; cursor:pointer; white-space:nowrap;
  padding:8px 16px; border-radius:9px; transition:all .2s;
}
.tab:hover{color:var(--c-text); background:rgba(255,255,255,.05);}
.tab.active{color:var(--c-text); background:rgba(30,123,255,.16); box-shadow:inset 0 0 0 1px rgba(30,123,255,.35);}
.topnav-right{margin-left:auto; display:flex; align-items:center; gap:12px;}
.np-avatar{
  width:34px;height:34px; display:grid; place-items:center; border-radius:9px;
  background:rgba(255,255,255,.06); border:1px solid var(--border); font-size:12px; color:var(--c-muted);
}

/* ---------- Side nav ---------- */
.sidenav{
  position:sticky; top:0; height:100vh; align-self:start;
  display:flex; flex-direction:column; gap:8px; padding:22px 16px;
  background:rgba(8,11,22,.6); backdrop-filter:blur(14px);
  border-right:1px solid var(--border);
}
.sidenav .logo{margin-bottom:18px; padding:0 6px;}
.sidenav-list{display:flex; flex-direction:column; gap:6px;}
.side-item{
  display:flex; align-items:center; gap:12px; text-align:left;
  font-family:var(--font-disp); font-weight:600; font-size:14px;
  color:var(--c-muted); background:none; border:none; cursor:pointer;
  padding:11px 14px; border-radius:10px; transition:all .2s;
}
.side-item:hover{color:var(--c-text); background:rgba(255,255,255,.05);}
.side-item.active{color:var(--c-text); background:rgba(30,123,255,.16); box-shadow:inset 0 0 0 1px rgba(30,123,255,.35);}
.side-ic{width:18px; text-align:center; color:var(--c-home2);}
.sidenav-foot{margin-top:auto; display:flex; flex-direction:column; gap:10px; padding:0 6px;}
.sidenav-build{font-size:11px; color:var(--c-subtle);}

/* ---------- Logo ---------- */
.logo{display:flex; align-items:center; gap:11px;}
.logo-mark{height:30px; width:auto; display:block;}
.logo-word{font-family:var(--font-disp); font-size:18px; font-weight:500; color:var(--c-muted); letter-spacing:.01em;}
.logo-word b{font-weight:700; color:var(--c-text); background:linear-gradient(90deg,#fff,var(--c-home2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}

/* ---------- Panels ---------- */
.panel{
  background:var(--panel); border:1px solid var(--border);
  border-radius:var(--radius); backdrop-filter:blur(var(--blur));
  box-shadow:var(--shadow); padding:var(--pad);
}
.screen{display:flex; flex-direction:column; gap:var(--gap);}

/* ---------- Section labels ---------- */
.section-label{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:14px;}
.section-label-l{border-left:3px solid var(--c-home); padding-left:11px;}
.section-kicker{display:block; font-family:var(--font-mono); font-size:10px; letter-spacing:.18em; color:var(--c-subtle); text-transform:uppercase;}
.section-title{font-family:var(--font-disp); font-weight:600; font-size:18px; color:var(--c-text); letter-spacing:.01em; white-space:nowrap;}
.hint{font-size:11px; color:var(--c-subtle); font-family:var(--font-mono);}

/* ---------- Chips ---------- */
.chip{
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:999px; padding:6px 12px; font-size:12px; color:var(--c-muted);
}
.chip-dot{width:8px;height:8px;border-radius:50%; flex:none;}
.chip-live .chip-dot{box-shadow:0 0 0 0 rgba(255,61,110,.55); animation:pulse 1.6s infinite;}
.chip-label{color:var(--c-muted); font-weight:500;}
.chip-val{color:var(--c-text); font-family:var(--font-mono); font-size:12px; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,61,110,.5);}70%{box-shadow:0 0 0 7px rgba(255,61,110,0);}100%{box-shadow:0 0 0 0 rgba(255,61,110,0);}}
.team-chip{display:inline-flex; align-items:center; font-family:var(--font-disp); font-weight:700; font-size:10px; letter-spacing:.06em; padding:3px 7px; border-radius:6px; border:1px solid; flex:none;}

/* ---------- Buttons ---------- */
.btn{
  font-family:var(--font-disp); font-weight:600; font-size:12.5px; letter-spacing:.04em; text-transform:uppercase;
  display:inline-flex; align-items:center; gap:8px; cursor:pointer;
  padding:9px 16px; border-radius:9px; border:1px solid var(--border); color:var(--c-muted);
  background:rgba(255,255,255,.04); transition:all .18s;
}
.btn:hover{color:var(--c-text); border-color:var(--border-2); background:rgba(255,255,255,.07);}
.btn-primary{color:#fff; border-color:transparent; background:linear-gradient(135deg,var(--c-home),#1462d6); box-shadow:0 6px 16px rgba(30,123,255,.3);}
.btn-primary:hover{filter:brightness(1.08); color:#fff;}
.btn-live{color:#fff; border-color:rgba(255,61,110,.5); background:rgba(255,61,110,.16);}
.rec-dot{width:9px;height:9px;border-radius:50%; background:var(--c-live);}
.rec-dot.pulse{animation:pulse 1.6s infinite;}

/* ---------- Dashboard ---------- */
.dash-titlebar{display:flex; flex-direction:column; gap:12px;}
.match-title{display:flex; align-items:center; gap:8px;}
.mt-edit{color:var(--c-subtle); font-size:13px;}
.mt-input{
  flex:1; background:transparent; border:none; color:var(--c-text);
  font-family:var(--font-disp); font-weight:600; font-size:22px; letter-spacing:.01em;
  border-bottom:1px dashed transparent; padding:2px 0; outline:none;
}
.mt-input:hover,.mt-input:focus{border-bottom-color:var(--border-2);}
.status-row{display:flex; flex-wrap:wrap; gap:8px;}

/* Scoreboard */
.scoreboard{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:24px; padding:calc(var(--pad) + 6px) var(--pad);}
.sb-side{display:flex; flex-direction:column; align-items:center; gap:6px;}
.sb-team{font-family:var(--font-disp); font-weight:600; font-size:16px; letter-spacing:.03em; color:var(--c-muted);}
.sb-home .sb-team{color:var(--c-home2);} .sb-away .sb-team{color:#FF6B6B;}
.sb-score{font-size:68px; font-weight:600; line-height:1; color:var(--c-text);}
.sb-center{display:flex; flex-direction:column; align-items:center; gap:8px; min-width:240px;}
.sb-half{font-family:var(--font-mono); font-size:11px; letter-spacing:.22em; color:var(--c-subtle);}
.sb-clock{font-size:46px; font-weight:500; color:var(--c-text); text-shadow:0 0 24px rgba(43,231,255,.25);}
.possession{position:relative; width:100%; height:7px; border-radius:99px; background:var(--c-away); overflow:visible;}
.poss-fill{height:100%; border-radius:99px; background:var(--c-home);}
.poss-l,.poss-r{position:absolute; top:11px; font-size:11px; color:var(--c-muted);}
.poss-l{left:0;} .poss-r{right:0;}

/* Control bar */
.control-bar{display:flex; flex-wrap:wrap; align-items:center; gap:10px;}
.control-spacer{flex:1;}

/* 2-col */
.dash-2col{display:grid; grid-template-columns:1fr 1fr; gap:var(--gap); align-items:start;}
.dash-2col.feed-major{grid-template-columns:1fr 1fr;}
.dash-stack{display:flex; flex-direction:column; gap:var(--gap);}

/* Team comparison */
.cmp-legend{display:flex; justify-content:space-between; font-size:11px; color:var(--c-muted); margin-bottom:12px; font-family:var(--font-disp);}
.cmp-legend span{display:flex; align-items:center; gap:6px;}
.dot{width:9px;height:9px;border-radius:50%; display:inline-block;}
.dot.home{background:var(--c-home);} .dot.away{background:var(--c-away);}
.cmp-rows{display:flex; flex-direction:column; gap:var(--rowgap);}
.cmp-row{display:grid; grid-template-columns:46px 1fr 46px; align-items:center; gap:10px;}
.cmp-val{font-size:14px; font-weight:600;}
.cmp-val.home{text-align:right; color:var(--c-home2);} .cmp-val.away{text-align:left; color:#FF6B6B;}
.cmp-bars{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px;}
.cmp-left,.cmp-right{height:9px; background:rgba(255,255,255,.05); border-radius:99px; overflow:hidden; display:flex;}
.cmp-left{justify-content:flex-end;}
.cmp-fill{height:100%; border-radius:99px;}
.cmp-fill.home{background:linear-gradient(90deg,rgba(30,123,255,.4),var(--c-home));}
.cmp-fill.away{background:linear-gradient(90deg,var(--c-away),rgba(220,38,38,.4));}
.cmp-mid{font-family:var(--font-mono); font-size:10px; letter-spacing:.04em; color:var(--c-subtle); text-transform:uppercase; min-width:64px; text-align:center;}

/* Live feed */
.feed-list{display:flex; flex-direction:column; gap:8px; max-height:430px; overflow-y:auto; padding-right:6px;}
.feed-item{display:flex; gap:12px; padding:10px; border-radius:10px; background:var(--panel-2); border:1px solid var(--border);}
.ev-badge{border-radius:50%; display:grid; place-items:center; flex:none;}
.feed-body{min-width:0;}
.feed-meta{display:flex; align-items:center; gap:8px; margin-bottom:3px;}
.feed-type{font-family:var(--font-disp); font-size:11px; font-weight:600; color:var(--c-muted); text-transform:uppercase; letter-spacing:.04em;}
.feed-time{font-size:11px; color:var(--c-subtle); margin-left:auto;}
.feed-desc{font-size:13px; color:var(--c-text); line-height:1.45;}
.feed-desc b{color:var(--c-home2); font-weight:600;}

/* Player table */
.ptable table{width:100%; border-collapse:collapse;}
.ptable th{font-family:var(--font-disp); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--c-subtle); text-align:left; padding:8px 10px; border-bottom:1px solid var(--border-2);}
.ptable .th-num{text-align:right; cursor:pointer; user-select:none;}
.ptable .th-num:hover{color:var(--c-text);}
.ptable th.sorted{color:var(--c-home2);}
.ptable td{padding:9px 10px; border-bottom:1px solid var(--border); font-size:13px;}
.ptable .td-name{color:var(--c-text); font-weight:500;}
.ptable .td-num{text-align:right; color:var(--c-muted);}
.ptable td.sorted{color:var(--c-text);}
.ptable tbody tr:hover{background:rgba(255,255,255,.03);}

/* Expanders */
.exp-group{display:flex; flex-direction:column; gap:10px;}
.expander{padding:0; overflow:hidden;}
.exp-head{width:100%; display:flex; align-items:center; gap:12px; padding:15px var(--pad); background:none; border:none; cursor:pointer; color:var(--c-text); font-family:var(--font-disp); font-weight:600; font-size:14px;}
.exp-head:hover{background:rgba(255,255,255,.03);}
.exp-caret{color:var(--c-home2); width:14px;}
.exp-title{flex:1; text-align:left;}
.exp-count{font-family:var(--font-mono); font-size:11px; color:var(--c-subtle); background:rgba(255,255,255,.05); padding:2px 9px; border-radius:99px;}
.exp-body{padding:0 var(--pad) var(--pad); border-top:1px solid var(--border);}
.subs-list{display:flex; flex-direction:column; gap:8px; padding-top:12px;}
.sub-row{display:flex; align-items:center; gap:12px; font-size:13px; padding:8px 10px; background:var(--panel-2); border-radius:8px;}
.sub-time{color:var(--c-subtle); font-size:12px;}
.sub-off{color:#FF6B6B;} .sub-on{color:var(--c-home2);}
.rawlog{display:flex; flex-direction:column; gap:3px; padding-top:12px; max-height:240px; overflow-y:auto;}
.raw-line{display:grid; grid-template-columns:54px 92px 90px 1fr; gap:10px; font-size:11.5px; color:var(--c-muted); padding:4px 0;}
.raw-t{color:var(--c-cyan);} .raw-ty{color:var(--c-subtle);} .raw-pl{color:var(--c-text);}
.pm-summary{padding-top:14px; color:var(--c-muted); font-size:13px; display:flex; flex-direction:column; gap:14px;}
.pm-actions{display:flex; gap:10px; flex-wrap:wrap;}

/* ---------- Page head (timeline/insights) ---------- */
.page-head{display:flex; align-items:center; justify-content:space-between; padding-bottom:4px;}
.page-kicker{font-family:var(--font-mono); font-size:11px; letter-spacing:.2em; color:var(--c-subtle);}
.page-title{font-family:var(--font-disp); font-weight:700; font-size:30px; letter-spacing:.01em; background:linear-gradient(90deg,#fff,var(--c-home2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}

/* ---------- Timeline ---------- */
.tl-filterbar{display:flex; align-items:center; gap:16px; flex-wrap:wrap; padding:14px 18px; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); backdrop-filter:blur(var(--blur));}
.field{display:flex; flex-direction:column; gap:5px;}
.field-label{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--c-subtle); font-family:var(--font-mono);}
.field select, .sort-toggle{
  font-family:var(--font-body); font-size:13px; color:var(--c-text);
  background:rgba(255,255,255,.05); border:1px solid var(--border-2); border-radius:8px; padding:8px 12px; cursor:pointer;
}
.sort-toggle{font-family:var(--font-disp); font-weight:600; align-self:flex-end;}
.sort-toggle:hover{border-color:var(--c-home);}
.tl-filterbar .hint{margin-left:auto;}

.tl-rail{position:relative; padding:20px 0;}
.tl-line{position:absolute; left:50%; top:0; bottom:0; width:2px; transform:translateX(-50%); background:linear-gradient(180deg,transparent,var(--border-2) 6%,var(--border-2) 94%,transparent);}
.tl-node{position:relative; display:grid; grid-template-columns:1fr 72px 1fr; align-items:center; margin-bottom:14px;}
.tl-node.left .tl-card{grid-column:1; text-align:right;}
.tl-node.left .tl-axis{grid-column:2;}
.tl-node.right .tl-card{grid-column:3; text-align:left;}
.tl-node.right .tl-axis{grid-column:2;}
.tl-axis{display:flex; justify-content:center;}
.tl-badge .ev-badge{box-shadow:0 0 0 2px var(--c-bg2), 0 0 0 4px rgba(255,255,255,.1);}
.tl-card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:13px 16px; cursor:pointer; backdrop-filter:blur(var(--blur)); transition:border-color .2s, transform .2s;}
.tl-card:hover{border-color:var(--border-2); transform:translateY(-1px);}
.tl-card-head{display:flex; align-items:baseline; gap:10px; margin-bottom:5px;}
.tl-node.left .tl-card-head{flex-direction:row-reverse;}
.tl-type{font-family:var(--font-disp); font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:.04em;}
.tl-time{font-size:12px; color:var(--c-subtle); margin-left:auto;}
.tl-node.left .tl-time{margin-left:0; margin-right:auto;}
.tl-card-desc{font-size:13px; color:var(--c-muted); line-height:1.45;}
.tl-card-desc b{color:var(--c-text);}
.tl-detail{margin-top:12px; padding-top:12px; border-top:1px solid var(--border);}
.tl-detail-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; text-align:left;}
.tl-node.left .tl-detail-grid{text-align:right;}
.tl-detail-grid>div{display:flex; flex-direction:column; gap:3px;}
.tl-node.left .tl-detail-grid>div{align-items:flex-end;}
.tl-detail .k{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--c-subtle); font-family:var(--font-mono);}
.tl-detail .v{font-size:13px; color:var(--c-text);}
.tl-export{display:flex; justify-content:center; margin-top:8px;}

/* ---------- Insights ---------- */
.mom-chart{}
.mom-svg{width:100%; height:260px; display:block;}
.mom-axis{display:flex; justify-content:space-between; margin-top:8px; font-size:11px; color:var(--c-subtle);}
.headline-row{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--gap);}
.headline-chip{display:flex; flex-direction:column; gap:10px; padding:18px var(--pad);}
.hc-label{font-family:var(--font-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--c-subtle);}
.hc-vs{display:flex; align-items:baseline; gap:10px; font-family:var(--font-mono);}
.hc-vs b{font-size:26px; font-weight:600;} .hc-vs .home{color:var(--c-home2);} .hc-vs .away{color:#FF6B6B;}
.hc-vs i{font-style:normal; font-size:12px; color:var(--c-subtle);}
.hc-leader{font-family:var(--font-disp); font-weight:700; font-size:24px; color:var(--c-home2);}

.chat{display:flex; flex-direction:column; gap:14px;}
.chat-prompts{display:flex; flex-wrap:wrap; gap:8px;}
.prompt-chip{font-family:var(--font-body); font-size:12.5px; color:var(--c-home2); background:rgba(30,123,255,.1); border:1px solid rgba(30,123,255,.3); border-radius:99px; padding:7px 14px; cursor:pointer; transition:all .18s;}
.prompt-chip:hover{background:rgba(30,123,255,.2); color:#fff;}
.chat-stream{display:flex; flex-direction:column; gap:12px; max-height:340px; overflow-y:auto; padding:4px;}
.bubble{max-width:74%; padding:12px 15px; border-radius:14px; font-size:13.5px; line-height:1.5;}
.bubble.ai{align-self:flex-start; background:var(--panel-2); border:1px solid var(--border); border-bottom-left-radius:4px; color:var(--c-text);}
.bubble.user{align-self:flex-end; background:linear-gradient(135deg,var(--c-home),#1462d6); border-bottom-right-radius:4px; color:#fff;}
.bub-tag{display:block; font-family:var(--font-mono); font-size:9px; letter-spacing:.16em; color:var(--c-cyan); margin-bottom:5px;}
.chat-input{display:flex; gap:10px;}
.chat-input input{flex:1; background:rgba(255,255,255,.05); border:1px solid var(--border-2); border-radius:10px; padding:12px 15px; color:var(--c-text); font-family:var(--font-body); font-size:14px; outline:none;}
.chat-input input:focus{border-color:var(--c-home);}
.chat-input input::placeholder{color:var(--c-subtle);}

/* ====================================================
   FIDELITY: Styled (full glass) is base. Mid + Sketch override.
   ==================================================== */
/* MID — flatten glass, keep color & structure */
.app[data-fi="mid"] .panel,
.app[data-fi="mid"] .tl-card,
.app[data-fi="mid"] .tl-filterbar{
  background:rgba(255,255,255,.045); backdrop-filter:none; box-shadow:none;
}
.app[data-fi="mid"] .btn-primary{box-shadow:none;}
.app[data-fi="mid"] .sb-clock{text-shadow:none;}

/* SKETCH — hand-drawn wireframe */
.app[data-fi="sketch"]{
  --font-disp:'Architects Daughter',cursive;
  --font-body:'Architects Daughter',cursive;
  --c-text:#E7ECF5; --c-muted:#AcB6C8; --c-subtle:#8C97AC;

name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # The audio/vision extras (PyAudio, whisper, torch) aren't needed for the
        # pure-logic tests; install just what the test suite imports.
        run: |
          python -m pip install --upgrade pip
          pip install \
            "SQLAlchemy>=2.0.0" "fpdf2>=2.7.0" "pillow>=10.0.0" \
            "pandas>=2.0.0" "requests>=2.31.0" "pytest>=8.0.0"

      - name: Run tests
        run: pytest
